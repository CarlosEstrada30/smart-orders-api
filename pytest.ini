[tool:pytest]
# Configuración simple para pytest

# Archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Configuración de logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Configuración de warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Configuración de testpaths
testpaths = tests

# Opciones por defecto
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Variables de entorno para tests
# Requiere: pipenv install pytest-env --dev
# pytest-env las inyecta en pytest_configure, ANTES de que se importe app/config.py
env =
    ENVIRONMENT = TEST
    DATABASE_URL = postgresql://postgres:postgres@localhost:5432/smart_orders_db_test
    SECRET_KEY = test-secret-key-for-testing-only
    ALGORITHM = HS256
    ACCESS_TOKEN_EXPIRE_MINUTES = 1440